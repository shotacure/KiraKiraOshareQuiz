AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Kira-Kira OshareQuiz - WebSocket API with Lambda and DynamoDB

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, prod]
  AdminSecret:
    Type: String
    Description: Simple password for admin/display authentication
    NoEcho: true
    MinLength: 4

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref QuizTable
        CONNECTIONS_TABLE_NAME: !Ref ConnectionsTable
        WEBSOCKET_ENDPOINT: !Sub "https://${QuizWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
        ADMIN_SECRET: !Ref AdminSecret

Resources:
  # ============================================================
  # DynamoDB Tables
  # ============================================================
  QuizTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "quiz-app-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  ConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "quiz-app-connections-${Stage}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: role
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RoleIndex
          KeySchema:
            - AttributeName: role
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ============================================================
  # WebSocket API
  # ============================================================
  QuizWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "quiz-websocket-${Stage}"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  QuizWebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref QuizWebSocketApi
      StageName: !Ref Stage
      AutoDeploy: true

  # ============================================================
  # Lambda Function (single handler)
  # ============================================================
  QuizHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "quiz-handler-${Stage}"
      CodeUri: src/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref QuizTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource:
                - !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuizWebSocketApi}/${Stage}/POST/@connections/*"

  QuizHandlerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref QuizHandlerFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${QuizWebSocketApi}/*"

  # ============================================================
  # WebSocket Routes
  # ============================================================
  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuizWebSocketApi
      RouteKey: "$connect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${ConnectIntegration}"

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuizWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QuizHandlerFunction.Arn}/invocations"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuizWebSocketApi
      RouteKey: "$disconnect"
      AuthorizationType: NONE
      Target: !Sub "integrations/${DisconnectIntegration}"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuizWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QuizHandlerFunction.Arn}/invocations"

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref QuizWebSocketApi
      RouteKey: "$default"
      AuthorizationType: NONE
      Target: !Sub "integrations/${DefaultIntegration}"

  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref QuizWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${QuizHandlerFunction.Arn}/invocations"

Outputs:
  WebSocketApiUrl:
    Description: WebSocket API endpoint URL
    Value: !Sub "wss://${QuizWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  WebSocketApiId:
    Description: WebSocket API ID
    Value: !Ref QuizWebSocketApi
  QuizTableName:
    Description: DynamoDB main table name
    Value: !Ref QuizTable
  ConnectionsTableName:
    Description: DynamoDB connections table name
    Value: !Ref ConnectionsTable
